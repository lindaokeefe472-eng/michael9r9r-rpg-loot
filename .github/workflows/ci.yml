name: RPG Loot Data Pack CI/CD & E2E Testing Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-test-and-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Headless MC Server E2E Integration Suite
      run: |
        python tests/e2e_ci_test.py

    - name: Package Data Pack Artifact
      if: success()
      run: |
        mkdir -p build
        zip -r build/michael9r9r-rpg-loot-datapack-v26.2.12.zip data/ pack.mcmeta

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: michael9r9r-rpg-loot-datapack-v26.2.12
        path: build/michael9r9r-rpg-loot-datapack-v26.2.12.zip
